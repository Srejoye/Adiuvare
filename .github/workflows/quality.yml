name: Quality

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check for placeholder junk and merge markers
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python scripts/check_repo_hygiene.py

      - name: Require tests for runtime changes
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python scripts/check_changed_code_has_tests.py

  types:
    name: Pyright
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and pyright
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tui,redis]"
          python -m pip install pyright

      - name: Run pyright
        run: pyright scripts

  workflows:
    name: Workflow lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.8
